{% extends 'base.html' %}
{% block title %}Login — Cilegon Smart City{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header-cilegon text-center py-3">
        <h4 class="mb-0"><i class="bi bi-lock-fill me-2"></i>Login</h4>
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Masukkan username" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Masukkan password" required>
          </div>
          {% if form.errors %}
            <div class="alert alert-danger py-2">
              Username atau password salah.
            </div>
          {% endif %}
          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-cilegon">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
          </div>
        </form>
        <hr>
        <p class="text-center small mb-0">
          Belum punya akun?
          <a href="{% url 'register' %}" class="text-danger fw-semibold">Daftar di sini</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
