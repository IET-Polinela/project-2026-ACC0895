<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Konten halaman akan dimasukkan di sini oleh router.js -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>


    <!-- ============================================================
         MODAL: Form Tambah / Edit Laporan
         Instruksi: kedua tombol WAJIB pakai type="button"
         ============================================================ -->
    <div class="modal fade" id="reportModal" tabindex="-1"
         aria-labelledby="reportModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">

                <!-- Header Modal -->
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold" id="reportModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>Buat Laporan Baru
                    </h5>
                    <button type="button" class="btn-close btn-close-white"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <!-- Body Modal: Form Fields -->
                <div class="modal-body p-4">
                    <form id="reportForm">

                        <!-- Field 1: Judul -->
                        <div class="mb-3">
                            <label for="fieldTitle" class="form-label fw-semibold">Judul Laporan</label>
                            <input type="text" class="form-control" id="fieldTitle"
                                   placeholder="Contoh: Jalan Berlubang di Jl. Sudirman" required>
                        </div>

                        <!-- Field 2: Kategori -->
                        <div class="mb-3">
                            <label for="fieldCategory" class="form-label fw-semibold">Kategori</label>
                            <select class="form-select" id="fieldCategory" required>
                                <option value="">-- Pilih Kategori --</option>
                                <option value="Jalan">Jalan</option>
                                <option value="Sampah">Sampah</option>
                                <option value="Banjir">Banjir</option>
                                <option value="Lampu">Lampu</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>

                        <!-- Field 3: Deskripsi -->
                        <div class="mb-3">
                            <label for="fieldDescription" class="form-label fw-semibold">Deskripsi</label>
                            <textarea class="form-control" id="fieldDescription" rows="3"
                                      placeholder="Jelaskan masalah yang ditemukan..." required></textarea>
                        </div>

                        <!-- Field 4: Lokasi -->
                        <div class="mb-3">
                            <label for="fieldLocation" class="form-label fw-semibold">Lokasi</label>
                            <input type="text" class="form-control" id="fieldLocation"
                                   placeholder="Contoh: Jl. Gatot Subroto No. 10, Lampung" required>
                        </div>

                    </form>
                </div>

                <!-- Footer Modal: Tombol Aksi (WAJIB type="button"!) -->
                <div class="modal-footer d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-outline-secondary fw-bold px-4"
                            id="btnDraft">
                        Simpan Draft
                    </button>
                    <button type="button" class="btn btn-primary fw-bold px-4"
                            id="btnSubmit">
                        Ajukan <i class="bi bi-send-fill ms-1"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>
    <!-- ============================================================ -->


    <!-- Bootstrap JS Bundle (WAJIB untuk Modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Urutan script PENTING! -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
