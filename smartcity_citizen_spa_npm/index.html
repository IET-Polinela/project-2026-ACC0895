<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga - Smart City Tracker</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (WAJIB pakai ini, bukan emoji!) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .spa-container { min-height: calc(100vh - 80px); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-buildings-fill me-2"></i>Smart City Portal
            </a>
            <div id="nav-menus" class="ms-auto"></div>
        </div>
    </nav>

    <!-- Konten halaman akan dimasukkan di sini oleh router.js -->
    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <!-- Urutan script PENTING! api.js dan auth.js dulu, baru app.js dan router.js -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/router.js"></script>
</body>
</html>
