<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Edit Laporan - Kota Cilegon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; }
        .header { background-color: #1a3a5c; padding: 16px 32px; display: flex; align-items: center; gap: 16px; }
        .header-logo { width: 52px; height: 52px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #1a3a5c; font-size: 11px; text-align: center; }
        .header-text h1 { color: white; font-size: 18px; }
        .header-text p { color: #a8c4e0; font-size: 12px; margin-top: 2px; }
        .navbar { background-color: #22527a; display: flex; padding: 0 32px; }
        .navbar a { color: #cce0f5; text-decoration: none; padding: 12px 20px; font-size: 14px; }
        .navbar a:hover { background-color: #1a3a5c; color: white; }
        .container { max-width: 600px; margin: 32px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); padding: 28px 32px; }
        .card h2 { color: #c46a00; font-size: 16px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #fde8c8; }
        label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 5px; margin-top: 14px; }
        input, textarea, select { width: 100%; padding: 9px 12px; border: 1px solid #ccd; border-radius: 6px; font-size: 14px; color: #333; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #c46a00; }
        textarea { height: 100px; resize: vertical; }
        .btn-row { display: flex; gap: 10px; margin-top: 24px; }
        .btn-simpan { flex: 1; padding: 10px; background: #c46a00; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-batal { flex: 1; padding: 10px; background: #eee; color: #555; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; text-align: center; }
        .error { color: #dc3545; font-size: 12px; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-logo">KOTA<br>CILEGON</div>
        <div class="header-text">
            <h1>Platform Pelaporan Masalah & Keluhan</h1>
            <p>Pemkot Cilegon — Melayani Masyarakat dengan Transparan</p>
        </div>
    </div>
    <div class="navbar">
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="/contacts/">Contacts</a>
    </div>
    <div class="container">
        <div class="card">
            <h2>Edit Laporan: {{ report.title }}</h2>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <label>{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="error">{{ field.errors }}</div>
                    {% endif %}
                {% endfor %}
                <div class="btn-row">
                    <button type="submit" class="btn-simpan">Simpan Perubahan</button>
                    <a href="/" class="btn-batal">Batal</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
